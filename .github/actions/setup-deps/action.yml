name: 'Setup Dependencies'
description: 'Setup pnpm, RocksDB cache, and install dependencies'

inputs:
  gh-token:
    description: 'GitHub token for authentication'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup RocksDB cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          deps/rocksdb
          deps/googletest
        key: ${{ runner.os }}-native-deps-${{ hashFiles('package.json', 'pnpm-lock.yaml', 'scripts/init-gtest/main.ts', 'deps/rocksdb/**', 'deps/googletest/**') }}
        restore-keys: |
          ${{ runner.os }}-native-deps-

    - name: Install dependencies
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: pnpm install --ignore-scripts --no-frozen-lockfile
