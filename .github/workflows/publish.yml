name: Publish

on:
  release:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: latest

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Generate GitHub token
        id: github-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Install dependencies
        shell: bash
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        run: pnpm install --ignore-scripts --no-frozen-lockfile

      - name: Determine version from the release tag
        id: version
        shell: bash
        run: |
          set -e
          set -o pipefail
          echo "Tag: ${{ github.event.release.tag_name }}"
          VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          echo "Version: $VERSION"
          if ! pnpm semver $VERSION; then
            echo "ERROR: Invalid version $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        shell: bash
        run: pnpm build

      - name: Test
        shell: bash
        run: pnpm test

  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-latest
            name: darwin-arm64
            target: arm64
          - runner: macos-15-intel
            name: darwin-x64
            target: x64
          - runner: ubuntu-22.04-arm
            name: linux-arm64-glibc
            libc: glibc
            target: arm64
          - runner: ubuntu-22.04
            name: linux-x64-glibc
            libc: glibc
            target: x64
          - runner: ubuntu-24.04-arm
            name: linux-arm64-musl
            libc: musl
            target: arm64
          - runner: ubuntu-latest
            name: linux-x64-musl
            libc: musl
            target: x64
          # windows-11-vs2026-arm (not windows-11-arm, which only has VS 2022):
          # rocksdb-prebuilds are compiled with VS 2026 (MSVC 14.5x), whose STL
          # emits ARM64 vector-algorithm symbols (__std_find_trivial_1, etc.)
          # that VS 2022's ARM64 STL libs don't provide, so linking fails with
          # LNK2001 unresolved externals unless we link with VS 2026 too.
          - runner: windows-11-vs2026-arm
            name: win32-arm64
            target: arm64
          - runner: windows-latest
            name: win32-x64
            target: x64
    name: Build on ${{ matrix.platform.runner }} for ${{ matrix.platform.name }} (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    needs: preflight
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: latest

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Generate GitHub token
        id: github-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Install dependencies
        shell: bash
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        run: pnpm install --ignore-scripts --no-frozen-lockfile

      - name: Build binding
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
          ROCKSDB_LIBC: ${{ matrix.platform.libc }}
        shell: bash
        run: pnpm build

      - name: Test binding
        shell: bash
        run: node scripts/test-binding.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.platform.name }}
          path: |
            build/Release/rocksdb-js.node
          if-no-files-found: error

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs: [preflight, build]
    outputs:
      package-name: ${{ steps.get-package-info.outputs.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: latest

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Generate GitHub token
        id: github-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Install dependencies
        shell: bash
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        run: pnpm install --ignore-scripts --no-frozen-lockfile

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: List artifacts
        shell: bash
        run: find artifacts -ls

      - name: Bump versions
        shell: bash
        run: node scripts/bump-versions.mjs ${{ needs.preflight.outputs.version }}

      - name: Configure git
        shell: bash
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git

      - name: Commit package.json
        shell: bash
        run: |
          set -e
          set -o pipefail
          git add package.json
          git commit -m "v${{ needs.preflight.outputs.version }}"
          git push origin HEAD:${{ github.event.release.target_commitish }}

      - name: Get package.json info
        id: get-package-info
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          echo "homepage=$(node -p "require('./package.json').homepage")" >> $GITHUB_OUTPUT

      - name: Publish bindings to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG: ${{ github.event.release.prerelease && 'next' || 'latest' }}
        shell: bash
        run: node scripts/publish-bindings.mjs

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: pnpm publish --access public --no-git-checks --tag ${{ github.event.release.prerelease && 'next' || 'latest' }}

      - name: Wait for npm to publish
        shell: bash
        timeout-minutes: 5
        run: |
          sleep 10
          while ! pnpm view ${{ steps.get-package-info.outputs.name }}@${{ needs.preflight.outputs.version }} > /dev/null 2>&1; do
            echo "Waiting for npm to publish ${{ steps.get-package-info.outputs.name }}@${{ needs.preflight.outputs.version }}..."
            sleep 10
          done
          echo "npm has published ${{ steps.get-package-info.outputs.name }}@${{ needs.preflight.outputs.version }}"

      - name: Update pnpm-lock.yaml
        env:
          GH_TOKEN: ${{ steps.github-token.outputs.token }}
        shell: bash
        run: pnpm install --ignore-scripts --no-frozen-lockfile

      - name: Commit pnpm-lock.yaml
        shell: bash
        run: |
          git add pnpm-lock.yaml
          git commit -m "chore(package): update pnpm-lock.yaml after publishing ${{ needs.preflight.outputs.version }}"
          git push origin HEAD:${{ github.event.release.target_commitish }}

  on-publish-success:
    if: success() && !cancelled()
    name: Publish success
    needs: [preflight, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "text": "${{ needs.publish.outputs.package-name }} v${{ needs.preflight.outputs.version }} has been published to npm",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ needs.publish.outputs.package-name }} v${{ needs.preflight.outputs.version }} has been published to npm"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status* :white_check_mark:"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "Published to :npm: <https://www.npmjs.com/package/${{ needs.publish.outputs.package-name }}/v/${{ needs.preflight.outputs.version }}|${{ needs.publish.outputs.package-name }}@${{ needs.preflight.outputs.version }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":github: <https://github.com/HarperFast/rocksdb-js/releases/tag/v${{ needs.preflight.outputs.version }}|GitHub Release>"
                    }
                  ]
                }
              ]
            }

      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          event-type: new-rocksdb-js
          repository: HarperFast/harper
          token: ${{ secrets.GH_TOKEN }}
          client-payload: |
            {
              "url": "https://github.com/HarperFast/rocksdb-js/releases/tag/v${{ needs.preflight.outputs.version }}",
              "version": "${{ needs.preflight.outputs.version }}"
            }

  on-publish-failure:
    if: failure() && !cancelled()
    name: Publish failure
    needs: [preflight, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "text": "${{ needs.publish.outputs.package-name }} v${{ needs.preflight.outputs.version }} npm publish failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ needs.publish.outputs.package-name }} v${{ needs.preflight.outputs.version }} npm publish failed"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status*"
                    },
                    {
                      "type": "mrkdwn",
                      "text": ":x: Failed to publish to :npm:"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Workflow run ${{ github.run_id }}>"
                    }
                  ]
                }
              ]
            }
