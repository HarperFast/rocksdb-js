name: Stress Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  stress:
    name: Run Stress Tests
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # 6.0.8
        with:
          version: latest

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup RocksDB cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
        with:
          path: deps/rocksdb
          key: stress-rocksdb-${{ hashFiles('package.json') }}
          restore-keys: |
            stress-rocksdb-

      - name: Install dependencies
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: pnpm install --ignore-scripts --no-frozen-lockfile

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: pnpm build

      - name: Run stress tests
        run: pnpm test:stress
